# Tox (http://tox.testrun.org/) is a tool for running tests
# in multiple virtualenvs. This configuration file will run the
# test suite on all supported python versions. To use it, "pip install tox"
# and then run "tox" from this directory.

[tox]
envlist = py310, py311, py312, py313, py314, pypy3.11, docs, pylint, typing, pre-commit, twinecheck, benchmark

[testenv]
deps =
    pytest !=3.1.1, !=3.1.2
    pytest-cov >= 7.0.0
    pytest-xdist
commands =
    python -m pytest \
        --doctest-modules \
        --cov=w3lib --cov-report=term --cov-report=xml -n auto \
        {posargs:w3lib tests}

[testenv:typing]
basepython = python3
deps =
    pytest
    mypy==1.20.2
commands =
    mypy {posargs: w3lib tests}

[testenv:pylint]
deps =
    {[testenv]deps}
    pylint==4.0.5
commands =
    pylint docs tests w3lib

[testenv:docs]
changedir = docs
deps = -rdocs/requirements.txt
commands =
    sphinx-build -W -b html . {envtmpdir}/html

[testenv:pre-commit]
deps = pre-commit
commands = pre-commit run --all-files --show-diff-on-failure
skip_install = true

[testenv:twinecheck]
basepython = python3
deps =
    twine==6.2.0
    build==1.4.0
commands =
    python -m build --sdist
    twine check dist/*

[testenv:benchmark]
basepython = python3.13
deps =
    {[testenv]deps}
    pytest-codspeed
passenv =
    *codspeed*
    *ci*
commands =
    python -m pytest tests/benchmarks/ --no-cov --codspeed --codspeed-mode=simulation
